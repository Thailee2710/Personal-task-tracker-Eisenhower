<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Project signature — Personal Task Tracker</title>
  <desc id="desc">A clean Eisenhower Matrix project signature with four priority quadrants and weekly planning accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.45" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="42" fill="url(#bg)"/>
  <circle cx="1058" cy="70" r="150" fill="#ffffff" opacity="0.54"/>
  <circle cx="120" cy="330" r="155" fill="#ffffff" opacity="0.58"/>

  <g filter="url(#shadow)">
    <rect x="72" y="58" width="260" height="244" rx="30" fill="#ffffff"/>
    <rect x="98" y="84" width="94" height="78" rx="18" fill="#fee2e2"/>
    <rect x="206" y="84" width="94" height="78" rx="18" fill="#dcfce7"/>
    <rect x="98" y="176" width="94" height="78" rx="18" fill="#fef3c7"/>
    <rect x="206" y="176" width="94" height="78" rx="18" fill="#e0e7ff"/>
    <path d="M202 78v188M92 170h214" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity="0.82"/>
    <circle cx="145" cy="123" r="11" fill="#ef4444"/>
    <circle cx="253" cy="123" r="11" fill="#22c55e"/>
    <circle cx="145" cy="215" r="11" fill="#f59e0b"/>
    <circle cx="253" cy="215" r="11" fill="#6366f1"/>
  </g>

  <g transform="translate(385 82)">
    <rect x="0" y="0" width="92" height="28" rx="14" fill="#111827" opacity="0.92"/>
    <text x="46" y="19" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1.4">FOCUS</text>

    <text x="0" y="82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="52" font-weight="800" fill="#111827">Personal Task Tracker</text>
    <text x="0" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600" fill="#475569">Eisenhower Matrix · Weekly Planning · Deadline Clarity</text>

    <g transform="translate(0 170)">
      <rect x="0" y="0" width="156" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="25" cy="22" r="7" fill="#ef4444"/>
      <text x="42" y="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#374151">Do now</text>

      <rect x="176" y="0" width="162" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="201" cy="22" r="7" fill="#22c55e"/>
      <text x="218" y="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#374151">Schedule</text>

      <rect x="358" y="0" width="162" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="383" cy="22" r="7" fill="#f59e0b"/>
      <text x="400" y="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#374151">Delegate</text>
    </g>
  </g>

  <path d="M1094 258c-34-8-56-31-60-63-2-17 3-35 15-51" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <path d="M1088 261l-28 12 9-30" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
