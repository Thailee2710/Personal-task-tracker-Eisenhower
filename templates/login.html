<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Login · Eisenhower Matrix</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-card">
    <img class="login-icon" src="/static/project-icon.svg" alt="Project icon">
    <div class="login-badge">✦ Personal workspace</div>
    <h1>Eisenhower Matrix</h1>
    <p>Đăng nhập để log task và ưu tiên công việc theo 4 quadrant.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="stack">
      <label>Username
        <input name="username" autocomplete="username" required autofocus>
      </label>
      <label>Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Đăng nhập</button>
    </form>
  </main>
</body>
</html>
